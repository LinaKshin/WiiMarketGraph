<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Index Simulation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0d0012;overflow-x:hidden;font-family:'Space Grotesk',sans-serif;}
    @keyframes spin{to{transform:rotate(360deg);}}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
    @keyframes shimmer{0%{background-position:-300% center;}100%{background-position:300% center;}}
    @keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .loader{animation:spin 1s linear infinite;}
    .pulse{animation:pulse 2s ease-in-out infinite;}
    .float{animation:float 4s ease-in-out infinite;}
    .ticker-wrap{overflow:hidden;background:#130018;border-bottom:1px solid #ff6eb422;padding:8px 0;}
    .ticker-inner{display:flex;animation:ticker 35s linear infinite;white-space:nowrap;}
    .ticker-inner:hover{animation-play-state:paused;}
    .fade-in{animation:fadeIn 0.4s ease forwards;}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:#0d0012;}
    ::-webkit-scrollbar-thumb{background:#ff6eb4;border-radius:4px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const CST = { timeZone:"America/Chicago" };

// Real verified closing data — April 1, 2026
const FALLBACK = {
  SP500:  { price:6575.32, open:6395.88, high:6575.32, low:6395.88, prevClose:6528.52 },
  DOW:    { price:46565.74, open:46341.51, high:46600.00, low:46100.00, prevClose:46341.51 },
  NASDAQ: { price:21840.95, open:21590.63, high:21850.00, low:21500.00, prevClose:21590.63 },
};

const INDICES = {
  SP500:  { label:"S&P 500",  symbol:"%5EGSPC", color:"#ff6eb4", glow:"#ff6eb433" },
  DOW:    { label:"DOW",      symbol:"%5EDJI",  color:"#c9b8ff", glow:"#c9b8ff33" },
  NASDAQ: { label:"NASDAQ",   symbol:"%5EIXIC", color:"#ffb3d9", glow:"#ffb3d933" },
};

const INDEX_EXPLAINERS = [
  {
    key:"SP500", color:"#ff6eb4",
    title:"S&P 500",
    tagline:"The most watched index in the world",
    plain:"Tracks the 500 biggest US companies. When people say \"the market is up today\" on the news, they're almost always talking about this one. If this goes up, the US economy is generally doing well.",
    topCompanies:["Apple","Microsoft","Nvidia","Amazon","Meta","Alphabet (Google)","Berkshire Hathaway","Eli Lilly","Broadcom","JPMorgan Chase"],
    sectors:[["Information Technology","33%"],["Financials","13%"],["Communication Svcs","11%"],["Consumer Disc.","10%"],["Health Care","9%"],["Industrials","9%"]],
    fact:"Covers about 80% of the entire US stock market's total value. There are actually 503 companies in it, not exactly 500.",
  },
  {
    key:"DOW", color:"#c9b8ff",
    title:"Dow Jones Industrial",
    tagline:"The oldest and most iconic index",
    plain:"Only tracks 30 very large, well-known US companies — the \"Hall of Fame\" of stocks. It's easier to understand but less representative of the full market since it's only 30 companies.",
    topCompanies:["Apple","Microsoft","Boeing","Goldman Sachs","Home Depot","Nike","McDonald's","Visa","Johnson & Johnson","Walmart","UnitedHealth","Amgen","Caterpillar","Cisco","Salesforce"],
    sectors:[["Technology","22%"],["Financials","18%"],["Health Care","14%"],["Industrials","14%"],["Consumer","12%"],["Energy / Other","20%"]],
    fact:"Started in 1896 — it's over 130 years old. It survived the Great Depression, two World Wars, the 2008 crash, and COVID.",
  },
  {
    key:"NASDAQ", color:"#ffb3d9",
    title:"NASDAQ Composite",
    tagline:"Where tech lives",
    plain:"Tracks over 3,000 companies but is dominated by technology. If tech stocks crash, this drops the hardest. If tech is booming, this rises the fastest. It moves more dramatically than the other two.",
    topCompanies:["Apple","Microsoft","Nvidia","Amazon","Meta","Alphabet (Google)","Tesla","Broadcom","Netflix","Adobe","Intel","AMD","Qualcomm","Applied Materials","Costco"],
    sectors:[["Technology","58%"],["Consumer Disc.","18%"],["Health Care","8%"],["Financials","7%"],["Industrials","4%"],["Other","5%"]],
    fact:"The top 10 companies in the NASDAQ make up over 50% of its total value — it's very concentrated at the top.",
  },
];

const GLOSSARY = [
  ["Index","A list of stocks grouped together to show how a slice of the market is doing. Like a report card for a specific group of companies."],
  ["Open","The price the index started at when the market opened — 8:30 AM CST on weekdays."],
  ["Close","The final price when the market closed — 3:00 PM CST. This is the official price for the day."],
  ["High","The highest price the index hit at any point during today's trading session."],
  ["Low","The lowest price the index dropped to at any point during today's trading session."],
  ["% Change","How much the price moved compared to yesterday's close. +1% = went up 1% from yesterday."],
  ["Prev Close","What the index closed at yesterday. This is what today's % change is calculated from."],
  ["Bull Market","When the market keeps going up for a long time. Investors are optimistic and buying. Bull charges forward."],
  ["Bear Market","When the market drops 20% or more from its recent peak. People are nervous and selling. Bear swipes downward."],
  ["Volatility","How wildly prices jump around. High volatility = big swings, more risk. Low volatility = calm and steady."],
  ["Dividend","When a company pays shareholders cash just for holding the stock — like a bonus from the company's profits."],
  ["Portfolio","All of your investments combined — your stocks, funds, etc. Your personal investment collection."],
  ["Day Range","The gap between today's lowest and highest price. A wide range means it was a wild, active day."],
];

const PROXY = "https://corsproxy.io/?";
const YF = sym => `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=1d`;

async function fetchAll() {
  const out = {}; let live = false;
  await Promise.all(Object.entries(INDICES).map(async ([key, cfg]) => {
    try {
      const res = await fetch(PROXY + encodeURIComponent(YF(cfg.symbol)), { signal: AbortSignal.timeout(7000) });
      const json = await res.json();
      const m = json?.chart?.result?.[0]?.meta;
      if (!m) throw new Error();
      const price = m.regularMarketPrice ?? m.previousClose;
      out[key] = {
        price, open: m.regularMarketOpen ?? price,
        high: m.regularMarketDayHigh ?? price,
        low: m.regularMarketDayLow ?? price,
        prevClose: m.previousClose ?? price, live: true,
      };
      live = true;
    } catch { out[key] = { ...FALLBACK[key], live: false }; }
  }));
  return { data: out, live };
}

function fmt(n, d=2) { return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d}); }

// Clean simple stat box visual — no confusing bar chart
function PriceStats({ q, color }) {
  const up = q.price >= q.prevClose;
  const chg = q.price - q.prevClose;
  const pct = (chg / q.prevClose * 100);

  // Simple visual: where is current price in today's range?
  const rangePct = ((q.price - q.low) / (q.high - q.low) * 100).toFixed(1);

  return (
    <div style={{marginTop:18}}>
      {/* 4 stat boxes */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
        {[
          {label:"OPEN", value:fmt(q.open), color:"#ffffff88"},
          {label:"HIGH", value:fmt(q.high), color:"#a8ffc4"},
          {label:"LOW",  value:fmt(q.low),  color:"#ff5f75"},
          {label:"PREV CLOSE", value:fmt(q.prevClose), color:"#ffffff44"},
        ].map(s=>(
          <div key={s.label} style={{
            background:"#ffffff07",borderRadius:10,padding:"10px 14px",
            border:"1px solid #ffffff0f",
          }}>
            <div style={{fontSize:9,color:"#ffffff33",letterSpacing:2,marginBottom:5,fontFamily:"'Courier New',monospace"}}>{s.label}</div>
            <div style={{fontSize:14,fontWeight:700,color:s.color,fontFamily:"'Courier New',monospace"}}>{s.value}</div>
          </div>
        ))}
      </div>

      {/* Simple "where in the day range" slider */}
      <div style={{background:"#ffffff08",borderRadius:10,padding:"12px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#ffffff44",marginBottom:8,fontFamily:"'Courier New',monospace"}}>
          <span>TODAY'S LOW</span>
          <span style={{color:up?"#a8ffc4":"#ff5f75",fontWeight:700}}>CURRENT PRICE — {rangePct}% OF DAY RANGE</span>
          <span>TODAY'S HIGH</span>
        </div>
        <div style={{position:"relative",height:8,background:"#ffffff08",borderRadius:20,overflow:"visible"}}>
          <div style={{
            position:"absolute",inset:0,borderRadius:20,
            background:`linear-gradient(90deg,#ff5f7533,${color}22,#a8ffc433)`,
          }}/>
          {/* current position dot */}
          <div style={{
            position:"absolute",
            left:rangePct+"%",
            top:"50%",transform:"translate(-50%,-50%)",
            width:16,height:16,borderRadius:"50%",
            background:up?"#a8ffc4":color,
            border:"2px solid #0d0012",
            boxShadow:`0 0 12px ${up?"#a8ffc4":color}`,
          }}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginTop:6,color:"#ffffff44",fontFamily:"'Courier New',monospace"}}>
          <span style={{color:"#ff5f75"}}>{fmt(q.low)}</span>
          <span style={{color:"#ffffff22",fontSize:9}}>← drag of the day →</span>
          <span style={{color:"#a8ffc4"}}>{fmt(q.high)}</span>
        </div>
      </div>
    </div>
  );
}

function ExplainerCard({ e, q }) {
  const up = q.price >= q.prevClose;
  const pct = ((q.price - q.prevClose) / q.prevClose * 100);
  return (
    <div style={{
      background:"linear-gradient(160deg,#1a0d24,#120818)",
      border:"1px solid "+e.color+"44", borderTop:"2px solid "+e.color,
      borderRadius:14,padding:"22px",
      boxShadow:"0 8px 40px "+e.color+"18",
      flex:"1 1 240px",minWidth:0,display:"flex",flexDirection:"column",gap:14,
    }}>
      <div>
        <div style={{fontSize:10,letterSpacing:3,color:e.color+"88",fontFamily:"'Courier New',monospace",marginBottom:3}}>{e.title}</div>
        <div style={{fontSize:15,fontWeight:800,color:"#fff",lineHeight:1.3,marginBottom:6}}>{e.tagline}</div>
        <div style={{fontSize:12,color:"#ffffffaa",lineHeight:1.85,borderLeft:"2px solid "+e.color+"44",paddingLeft:12}}>{e.plain}</div>
      </div>

      {/* Live price */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#ffffff08",borderRadius:10,padding:"10px 14px"}}>
        <div>
          <div style={{fontSize:9,color:"#ffffff33",marginBottom:2,letterSpacing:1}}>TODAY'S PRICE</div>
          <div style={{fontSize:22,fontWeight:800,color:e.color,fontFamily:"'Courier New',monospace"}}>{fmt(q.price)}</div>
        </div>
        <div style={{
          padding:"6px 12px",borderRadius:20,fontSize:12,fontWeight:700,
          background:up?"#a8ffc418":"#ff5f7518",
          color:up?"#a8ffc4":"#ff5f75",
          border:"1px solid "+(up?"#a8ffc433":"#ff5f7533"),
        }}>{up?"▲":"▼"} {up?"+":""}{pct.toFixed(2)}%</div>
      </div>

      {/* Top companies */}
      <div>
        <div style={{fontSize:10,letterSpacing:2,color:"#ffffff33",marginBottom:8,fontFamily:"'Courier New',monospace"}}>TOP COMPANIES INSIDE THIS INDEX</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
          {e.topCompanies.map(c=>(
            <span key={c} style={{
              fontSize:11,padding:"4px 10px",borderRadius:20,
              background:"#ffffff0a",color:"#ffffffaa",
              border:"1px solid "+e.color+"22",fontWeight:600,
            }}>{c}</span>
          ))}
        </div>
      </div>

      {/* Sector breakdown */}
      <div>
        <div style={{fontSize:10,letterSpacing:2,color:"#ffffff33",marginBottom:10,fontFamily:"'Courier New',monospace"}}>SECTOR BREAKDOWN</div>
        {e.sectors.map(([name,pctVal])=>(
          <div key={name} style={{display:"flex",alignItems:"center",gap:10,marginBottom:7}}>
            <div style={{width:140,fontSize:11,color:"#ffffff66",flexShrink:0}}>{name}</div>
            <div style={{flex:1,background:"#ffffff08",borderRadius:10,height:6,overflow:"hidden"}}>
              <div style={{height:"100%",width:pctVal,background:e.color,borderRadius:10,boxShadow:"0 0 5px "+e.color,opacity:0.85}}/>
            </div>
            <div style={{width:32,fontSize:11,color:e.color+"bb",textAlign:"right",fontWeight:700}}>{pctVal}</div>
          </div>
        ))}
      </div>

      <div style={{fontSize:11,color:"#ffffff44",borderTop:"1px solid #ffffff0a",paddingTop:12,lineHeight:1.7}}>{e.fact}</div>
    </div>
  );
}

function App() {
  const [quotes, setQuotes] = useState(null);
  const [live, setLive] = useState(false);
  const [time, setTime] = useState(new Date());
  const [lastRefresh, setLastRefresh] = useState(null);
  const [tab, setTab] = useState("dashboard");
  const [bannerOpen, setBannerOpen] = useState(true);

  async function load() {
    const { data, live:l } = await fetchAll();
    setQuotes(data); setLive(l); setLastRefresh(new Date());
  }

  useEffect(()=>{load();},[]);
  useEffect(()=>{const id=setInterval(load,60000);return()=>clearInterval(id);},[]);
  useEffect(()=>{const id=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(id);},[]);

  const timeStr = time.toLocaleString("en-US",{...CST,hour12:false,hour:"2-digit",minute:"2-digit",second:"2-digit"});
  const dateStr = time.toLocaleDateString("en-US",{...CST,weekday:"short",month:"short",day:"numeric",year:"numeric"});

  if (!quotes) return (
    <div style={{background:"#0d0012",minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
      <div style={{width:40,height:40,border:"3px solid #ff6eb422",borderTop:"3px solid #ff6eb4",borderRadius:"50%"}} className="loader"/>
      <div style={{marginTop:16,fontSize:12,letterSpacing:4,color:"#ff6eb488",fontFamily:"'Courier New',monospace"}}>FETCHING MARKET DATA...</div>
    </div>
  );

  const tickerText = Object.entries(INDICES).map(([k,cfg])=>{
    const q=quotes[k]; const up=q.price>=q.prevClose;
    const pct=((q.price-q.prevClose)/q.prevClose*100).toFixed(2);
    return `${cfg.label}  ${fmt(q.price)}  ${up?"▲":"▼"}${Math.abs(pct)}%`;
  }).join("          ·          ");

  return (
    <div style={{background:"#0d0012",minHeight:"100vh",color:"#f0e6f6"}}>



      <div className="ticker-wrap">
        <div className="ticker-inner">
          {[tickerText,tickerText].map((t,i)=>(
            <span key={i} style={{paddingRight:120,fontSize:12,color:"#ff9ed2",fontFamily:"'Courier New',monospace",letterSpacing:1}}>{t}</span>
          ))}
        </div>
      </div>

      {/* Club banner */}
      <div style={{
        background:"linear-gradient(90deg,#2a0a3a,#1a0828,#2a0a3a)",
        borderBottom:"1px solid #ff6eb433",
        padding:"12px 24px",
        textAlign:"center",
        fontSize:13,
        color:"#ffb4d4",
        letterSpacing:0.3,
        lineHeight:1.9,
      }}>
        <div style={{fontSize:11,letterSpacing:3,color:"#ff6eb488",marginBottom:4,fontFamily:"'Courier New',monospace"}}>TEXAS WOMEN IN INVESTING</div>
        Hey guys! Make sure you're participating in <strong style={{color:"#ff6eb4"}}>Investopedia</strong> — use this dashboard as a visual aid and reference, not as your only source.
        &nbsp; <span style={{color:"#c9b8ff",fontWeight:700}}>The winner gets a chance to win $100 of real money to invest.</span>
      </div>

      <div style={{position:"fixed",top:-150,left:-150,width:500,height:500,borderRadius:"50%",background:"radial-gradient(circle,#ff6eb41a,transparent 70%)",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"fixed",bottom:-150,right:-150,width:600,height:600,borderRadius:"50%",background:"radial-gradient(circle,#c9b8ff0f,transparent 70%)",pointerEvents:"none",zIndex:0}}/>
      <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:1,backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 4px)"}}/>

      <div style={{maxWidth:920,margin:"0 auto",padding:"28px 20px",position:"relative",zIndex:2}}>

        {/* Header */}
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{fontSize:24,fontWeight:800,letterSpacing:10,color:"#ff6eb4",textShadow:"0 0 24px #ff6eb4bb, 0 0 60px #ff6eb444",marginBottom:4}} className="float">WII MARKET WATCH</div>
          <div style={{fontSize:10,letterSpacing:4,color:"#ff9ed266",marginBottom:14}}>developed by lina · Texas Women in Investing</div>
          <h1 style={{
            margin:0,fontSize:26,fontWeight:700,letterSpacing:4,
            background:"linear-gradient(90deg,#ff6eb4,#ffffff,#c9b8ff,#ffb3d9)",
            backgroundSize:"300% auto",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
            animation:"shimmer 5s linear infinite",textTransform:"uppercase",
          }}>LIVE INDEX SIMULATION</h1>
          <div style={{fontSize:11,color:"#ffffff44",marginTop:8}}>{dateStr} · {timeStr} CST</div>
          <div style={{fontSize:11,marginTop:4,color:live?"#ff6eb4":"#ffb347"}} className={live?"pulse":""}>
            {live ? "● Live — Yahoo Finance (~15 min delay)" : "● Offline — showing last verified data"}
            {lastRefresh && <span style={{color:"#ffffff22",marginLeft:8}}>· refreshed {lastRefresh.toLocaleString("en-US",{...CST,hour:"2-digit",minute:"2-digit",second:"2-digit",hour12:false})} CST</span>}
          </div>
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:8,marginBottom:28,borderBottom:"1px solid #ff6eb422",paddingBottom:12}}>
          {[["dashboard","Indexes"],["explainer","What Are These?"],["glossary","Glossary"],["analysts","Analysts"]].map(([id,label])=>(
            <button key={id} onClick={()=>setTab(id)} style={{
              padding:"8px 20px",borderRadius:8,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,
              background:tab===id?"linear-gradient(135deg,#ff6eb4,#c9b8ff)":"#ffffff0f",
              color:tab===id?"#0d0012":"#ffffff77",transition:"all 0.2s",
            }}>{label}</button>
          ))}
        </div>

        {/* DASHBOARD */}
        {tab==="dashboard" && (
          <div style={{display:"flex",flexDirection:"column",gap:20}} className="fade-in">
            {Object.entries(INDICES).map(([key,cfg])=>{
              const q=quotes[key];
              const up=q.price>=q.prevClose;
              const chg=q.price-q.prevClose;
              const pct=(chg/q.prevClose*100);
              const dayRange=((q.high-q.low)/q.low*100).toFixed(3);
              return (
                <div key={key} style={{
                  background:"linear-gradient(145deg,#1a0d24f0,#12081af0)",
                  border:"1px solid "+cfg.color+"33",borderLeft:"3px solid "+cfg.color,
                  borderRadius:14,padding:"24px 28px",
                  boxShadow:"0 4px 50px "+cfg.glow+", inset 0 1px 0 "+cfg.color+"1a",
                  position:"relative",overflow:"hidden",
                }}>
                  <div style={{position:"absolute",right:-8,top:"50%",transform:"translateY(-50%)",fontSize:90,fontWeight:900,color:cfg.color,opacity:0.03,pointerEvents:"none",userSelect:"none"}}>{cfg.label}</div>

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:16}}>
                    <div>
                      <div style={{fontSize:10,letterSpacing:4,color:cfg.color+"99",marginBottom:4,fontFamily:"'Courier New',monospace"}}>{cfg.label}</div>
                      <div style={{color:cfg.color,fontWeight:800,fontSize:44,letterSpacing:-1,textShadow:"0 0 20px "+cfg.color+"88",lineHeight:1}}>
                        {fmt(q.price)}
                      </div>
                      <div style={{marginTop:8,fontSize:17,fontWeight:700,color:up?"#a8ffc4":"#ff5f75",textShadow:up?"0 0 12px #a8ffc466":"0 0 12px #ff5f7566"}}>
                        {up?"▲":"▼"} {fmt(Math.abs(chg))} &nbsp;<span style={{fontSize:14}}>({up?"+":""}{pct.toFixed(2)}%)</span>
                        <span style={{fontSize:10,color:"#ffffff33",marginLeft:10,fontWeight:400}}>vs yesterday</span>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:9,color:"#ffffff22",letterSpacing:2,marginBottom:8,fontFamily:"'Courier New',monospace"}}>DAY RANGE</div>
                      <div style={{fontSize:12,color:"#ffddaa",fontFamily:"'Courier New',monospace",fontWeight:700}}>{dayRange}%</div>
                      <div style={{fontSize:9,color:"#ffffff22",marginTop:4,fontFamily:"'Courier New',monospace"}}>
                        {fmt(q.low)} — {fmt(q.high)}
                      </div>
                    </div>
                  </div>

                  <PriceStats q={q} color={cfg.color}/>
                </div>
              );
            })}

            {/* Comparison */}
            <div style={{background:"linear-gradient(145deg,#1a0d24,#12081a)",border:"1px solid #ff6eb422",borderRadius:14,padding:"22px 28px"}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#ff6eb488",marginBottom:6,fontFamily:"'Courier New',monospace"}}>TODAY'S PERFORMANCE</div>
              <div style={{fontSize:12,color:"#ffffff33",marginBottom:18}}>How much each index moved vs yesterday's close</div>
              {Object.entries(INDICES).map(([key,cfg])=>{
                const q=quotes[key];
                const pct=(q.price-q.prevClose)/q.prevClose*100;
                const up=pct>=0;
                const barW=Math.min(Math.abs(pct)*20,100);
                return (
                  <div key={key} style={{display:"flex",alignItems:"center",gap:14,marginBottom:14}}>
                    <div style={{width:72,fontSize:12,fontWeight:700,color:cfg.color,fontFamily:"'Courier New',monospace"}}>{cfg.label}</div>
                    <div style={{flex:1,background:"#ffffff08",borderRadius:20,height:12,overflow:"hidden",position:"relative"}}>
                      <div style={{
                        position:"absolute",top:0,left:0,height:"100%",width:barW+"%",borderRadius:20,
                        background:up?`linear-gradient(90deg,${cfg.color}55,${cfg.color})`:`linear-gradient(90deg,#ff5f7555,#ff5f75)`,
                        boxShadow:`0 0 8px ${up?cfg.color:"#ff5f75"}55`,transition:"width 1.2s ease",
                      }}/>
                    </div>
                    <div style={{width:90,textAlign:"right",fontSize:13,fontWeight:700,color:up?"#a8ffc4":"#ff5f75",fontFamily:"'Courier New',monospace"}}>
                      {up?"+":""}{pct.toFixed(2)}%
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* EXPLAINER */}
        {tab==="explainer" && (
          <div className="fade-in">
          <div style={{display:"flex",gap:18,flexWrap:"wrap"}}>
              {INDEX_EXPLAINERS.map(e=><ExplainerCard key={e.key} e={e} q={quotes[e.key]}/>)}
            </div>
          </div>
        )}

        {/* GLOSSARY */}
        {tab==="glossary" && (
          <div className="fade-in">
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {GLOSSARY.map(([term,def],i)=>(
                <div key={i} style={{
                  background:"linear-gradient(145deg,#1a0d24,#12081a)",
                  border:"1px solid #ff6eb422",borderRadius:12,
                  padding:"14px 20px",display:"flex",gap:20,alignItems:"flex-start",
                }}>
                  <div style={{minWidth:120,fontSize:12,fontWeight:700,color:"#ff6eb4",fontFamily:"'Courier New',monospace",paddingTop:1,flexShrink:0}}>{term}</div>
                  <div style={{fontSize:13,color:"#ffffffaa",lineHeight:1.8}}>{def}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ANALYSTS */}
        {tab==="analysts" && (
          <div className="fade-in">
            <div style={{fontSize:13,color:"#ffb4d4",marginBottom:28,lineHeight:1.8,background:"#ff6eb40d",border:"1px solid #ff6eb433",borderRadius:12,padding:"14px 20px"}}>
              Reach out to any of us if you have questions!
            </div>

            {/* Senior Analysts */}
            <div style={{fontSize:10,letterSpacing:4,color:"#ff6eb488",marginBottom:16,fontFamily:"'Courier New',monospace"}}>SENIOR ANALYSTS</div>
            <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:32}}>
              {[
                { name:"Lina Shin", role:"Senior Analyst" },
                { name:"Aanika Sethi", role:"Senior Analyst" },
              ].map(a=>(
                <div key={a.name} style={{
                  flex:"1 1 200px",
                  background:"linear-gradient(145deg,#1a0d24,#12081a)",
                  border:"1px solid #ff6eb455",
                  borderTop:"3px solid #ff6eb4",
                  borderRadius:14,padding:"24px",
                  boxShadow:"0 4px 40px #ff6eb422",
                  display:"flex",flexDirection:"column",alignItems:"center",gap:12,textAlign:"center",
                }}>
                  <div style={{
                    width:72,height:72,borderRadius:"50%",
                    background:"linear-gradient(135deg,#ff6eb4,#c9b8ff)",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:26,fontWeight:800,color:"#0d0012",
                    boxShadow:"0 0 24px #ff6eb455",
                  }}>
                    {a.name.split(" ").map(w=>w[0]).join("")}
                  </div>
                  <div>
                    <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:4}}>{a.name}</div>
                    <div style={{
                      fontSize:11,fontWeight:600,letterSpacing:2,
                      color:"#ff6eb4",fontFamily:"'Courier New',monospace",
                      background:"#ff6eb415",padding:"4px 12px",borderRadius:20,
                      border:"1px solid #ff6eb433",
                    }}>{a.role.toUpperCase()}</div>
                  </div>
                </div>
              ))}
            </div>

            {/* Junior Analysts */}
            <div style={{fontSize:10,letterSpacing:4,color:"#c9b8ff88",marginBottom:16,fontFamily:"'Courier New',monospace"}}>JUNIOR ANALYSTS</div>
            <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
              {[
                { name:"Laiba Zindani", role:"Junior Analyst" },
                { name:"Suhani Goyal", role:"Junior Analyst" },
              ].map(a=>(
                <div key={a.name} style={{
                  flex:"1 1 200px",
                  background:"linear-gradient(145deg,#1a0d24,#12081a)",
                  border:"1px solid #c9b8ff33",
                  borderTop:"3px solid #c9b8ff",
                  borderRadius:14,padding:"24px",
                  boxShadow:"0 4px 40px #c9b8ff18",
                  display:"flex",flexDirection:"column",alignItems:"center",gap:12,textAlign:"center",
                }}>
                  <div style={{
                    width:72,height:72,borderRadius:"50%",
                    background:"linear-gradient(135deg,#c9b8ff,#ffb3d9)",
                    display:"flex",alignItems:"center",justifyContent:"center",
                    fontSize:26,fontWeight:800,color:"#0d0012",
                    boxShadow:"0 0 24px #c9b8ff44",
                  }}>
                    {a.name.split(" ").map(w=>w[0]).join("")}
                  </div>
                  <div>
                    <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:4}}>{a.name}</div>
                    <div style={{
                      fontSize:11,fontWeight:600,letterSpacing:2,
                      color:"#c9b8ff",fontFamily:"'Courier New',monospace",
                      background:"#c9b8ff15",padding:"4px 12px",borderRadius:20,
                      border:"1px solid #c9b8ff33",
                    }}>{a.role.toUpperCase()}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}


        <div style={{
          marginTop:36,padding:"16px 22px",
          background:"#ff6eb40d",border:"1px solid #ff6eb433",
          borderRadius:12,fontSize:12,color:"#ffb4d4cc",lineHeight:2,textAlign:"center",
        }}>
          <strong style={{color:"#ff6eb4"}}>DISCLAIMER GUYS</strong> — this isn't 100% accurate and is based on numbers from Yahoo Finance.
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
